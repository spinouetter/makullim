name: Deploy to GitHub Pages

# GitHub Pages 소스를 "GitHub Actions"로 설정해야 동작합니다.
# (Settings → Pages → Build and deployment → Source: GitHub Actions)
# Secret DROPBOX_APP_KEY 가 있으면 js/config.js 의 자리표시자에 주입합니다(없으면 백업 기능 비활성).

on:
  push:
    branches: [main]          # 커밋(피날레 모양에 영향 줄 수 있는 수정) 시 썸네일 재생성
  workflow_dispatch:
  schedule:
    - cron: '0 15 * * *'      # 매일 00:00 KST(15:00 UTC) — 공연이 끝난 뒤 '마지막 공연' 시드가 바뀌면 썸네일 갱신

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  # 배포 중인 run은 취소하지 않는다(취소 시 Pages 환경에 미완료 배포가 남아
  # 이후 배포가 "Deployment failed, try again later"로 거부될 수 있음). GitHub 공식 권장값.
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy1.outputs.page_url || steps.deploy2.outputs.page_url || steps.deploy3.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      # 공연별 slug 주소(/<slug>/) 스텁 생성 — 저장소에 커밋하지 않고 배포물에만 포함.
      # index.html을 복사하며 <!-- __SHOW__ --> 마커에 공연 id와 빌드 버전(커밋 짧은 SHA)을 주입한다.
      # 빌드 버전은 앱이 데이터(JSON) 요청에 ?v=<빌드>를 붙여 브라우저 캐시를 쓰게 하는 캐시 버스터 —
      # 데이터는 커밋 시점에 확정되므로 배포가 바뀔 때만 URL이 바뀌면 충분하다(js?v=NN과 같은 원리).
      # 루트(/)는 앱이 default 공연 slug로 리다이렉트.
      - name: Generate show slug stubs
        run: |
          set -e
          build="${GITHUB_SHA::7}"
          for id in $(jq -r '.shows[]' shows/index.json); do
            slug=$(jq -r '.slug // empty' "shows/$id.json")
            if [ -z "$slug" ]; then echo "slug 없음: $id — 스텁 생략"; continue; fi
            # 앱 자원 폴더와 충돌하는 slug는 배포 사고 방지를 위해 실패 처리
            case "$slug" in
              css|js|data|fonts|shows|theatres|scripts|requests|images|json)
                echo "::error::slug '$slug'($id)는 예약된 폴더명과 충돌합니다."; exit 1;;
            esac
            mkdir -p "$slug"
            sed "s|<!-- __SHOW__ -->|<script>window.MAKULLIM_SHOW_ID=\"$id\";window.MAKULLIM_BUILD=\"$build\";</script>|" index.html > "$slug/index.html"
            echo "스텁 생성: /$slug/ ← $id (build $build)"
          done
          # 루트 index.html에도 빌드 버전만 주입(공연 id는 없음 — 리다이렉트/로컬 선택용).
          # 스텁 생성이 원본 마커를 읽은 뒤에 치환해야 하므로 이 단계 마지막에 수행.
          sed -i "s|<!-- __SHOW__ -->|<script>window.MAKULLIM_BUILD=\"$build\";</script>|" index.html

      - name: Inject Dropbox App key
        env:
          DROPBOX_APP_KEY: ${{ secrets.DROPBOX_APP_KEY }}
        run: |
          if [ -n "$DROPBOX_APP_KEY" ]; then
            # Dropbox App key는 영숫자라 sed 치환이 안전(| 구분자 사용)
            sed -i "s|__DROPBOX_APP_KEY__|${DROPBOX_APP_KEY}|" js/config.js
            echo "Dropbox App key injected."
          else
            echo "DROPBOX_APP_KEY 시크릿이 없습니다 — 백업 기능은 비활성으로 배포됩니다."
          fi

      # 피날레 탭 디자인 썸네일: 관극수·좌석수를 랜덤으로, 사진 없는 배우는 플레이스홀더로
      # 채운 '관극 인증 이미지' 미리보기를 매 배포마다 새로 생성해 배포물에 포함(커밋 안 함).
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate finale preview thumbnail
        run: |
          set -e
          # 러너에 이미 깔린 Google Chrome을 재사용 → 크로미엄(~150MB) 다운로드 생략(배포 속도 ↑).
          npm i --no-save playwright-core@1.44
          CHROME="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium-browser || true)"
          if [ -n "$CHROME" ]; then
            echo "시스템 Chrome 사용: $CHROME"
            PW_CHROMIUM="$CHROME" node scripts/gen-finale-preview.js
          else
            echo "시스템 Chrome 없음 → playwright 크로미엄 설치로 폴백"
            npm i --no-save playwright@1.44
            npx playwright install chromium
            node scripts/gen-finale-preview.js
          fi
          ls -l shows/*/images/finale-preview.jpg   # 산출물 확인(없으면 여기서 실패로 표시)
        continue-on-error: true   # 미리보기 생성 실패해도 배포는 계속(앱이 라이브 보드로 폴백)

      # 성공/실패와 무관하게 임시 설치물 정리(안 하면 node_modules가 배포물에 포함됨)
      - name: Clean up preview build deps
        if: always()
        run: rm -rf node_modules package.json package-lock.json

      - name: Ensure .nojekyll
        run: touch .nojekyll

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      # Pages 배포는 GitHub 인프라 일시 오류로 "Deployment failed, try again later"가
      # 간헐 발생한다(빌드·아티팩트는 성공, 배포 API만 실패). 자동으로 최대 3회 재시도한다.
      # 아티팩트 업로드는 위에서 1회만 하고, deploy-pages만 재시도(중복 아티팩트 방지).
      - name: Deploy to GitHub Pages
        id: deploy1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 2
        if: steps.deploy1.outcome == 'failure'
        run: sleep 20
      - name: Deploy to GitHub Pages (retry 2)
        id: deploy2
        if: steps.deploy1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        run: sleep 30
      - name: Deploy to GitHub Pages (retry 3)
        id: deploy3
        if: steps.deploy1.outcome == 'failure' && steps.deploy2.outcome == 'failure'
        uses: actions/deploy-pages@v4
